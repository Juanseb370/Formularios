<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="CSS/formulario.css">
</head>
<body>
    <div class="container">
        <h2> Formulario de Producto</h2>

        <form action="" method="get" class="form-container" id="productoForm">
            <div class="form-group">
                <label for="nombre"> Nombre del producto:</label>
                <input type="text" id="nombre" placeholder="Ingresa el nombre" required minlength="3" maxlength="20">
            </div>
            <div class="form-group">
                <label for="precio"> Precio (COP):</label>
                <input type="text" id="precio" placeholder="Ingrese el precio" required min="1" max="1000000000">
            </div>
            <div class="form-group">
                <label for="marca">Marca</label>
                <input type="text" name="marca" id="marca" placeholder="Ingrese la marca">
            </div>
            <div class="from-group">
                <label for="categoria">Categoria</label>
                <select id="categoria" required>
                    <option value=""> Selecione una categoria</option>
                    <option value="electronica">Electronica</option>
                    <option value="ropa">Ropa</option>
                    <option value="hogar">Hogar</option>
                    <option value="otros">Otros</option>
                </select>
            </div>
            <div class="form-group full-widt">
                <label for="descripcion"> Descripcion:</label>
                <textarea placeholder="Ingrese la descripcion" id="descripcion" required></textarea>
            </div>
            <div class="form-group full-width">
                <label for="imagen"> Imagen del producto:</label>
                <input type="file" id="imagen" accept="image/*" required>
                <img class="preview-img"  id="previewImg"  alt="Vista previa">
            </div>
            <div class="button-container">
                <button id="btnAgregar" type="submit">Registrar Producto</button>
            </div>
        </form>
    </div>
    <script src="JS/formulario.js"></script>
</body>
</html>
